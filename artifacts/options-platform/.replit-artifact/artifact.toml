kind = "web"
previewPath = "/"
title = "Options Platform"
version = "1.0.0"
id = "artifacts/options-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22164

[services.development]
run = "pnpm --filter @workspace/options-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/options-platform", "run", "build" ]
publicDir = "artifacts/options-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22164"
BASE_PATH = "/"
